<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Grafo Aeropuertos</title>
  <link rel="stylesheet" href="../estilos/graph-styles.css" />
</head>
<body>
  <header>
    <strong>Grafo Dirigido</strong>
    <div class="controls">
      <button id="btnLoadSample">Cargar JSON</button>
    </div>
  </header>

  <section id="graphContainer">
    <svg id="graphSvg"></svg>
  </section>

  <section id="status">Selecciona un nodo para ver detalle.</section>

  <div id="jsonModal" class="modal hidden">
    <div class="modal-content">
      <button class="modal-close" data-close="jsonModal">✕</button>
      <h3>Cargar JSON</h3>
      <p class="card-desc">Selecciona un archivo JSON con la estructura de aeropuertos y rutas.</p>
      <label class="file-upload-label">
        <span id="fileLabel">Seleccionar archivo .json</span>
        <input type="file" id="jsonFile" accept=".json" />
      </label>
      <button id="loadJsonConfirmBtn" class="btn btn-blue" style="width:100%">Cargar</button>
    </div>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script type="module" src="../scripts/demo-graph.js"></script>
</body>
</html>
